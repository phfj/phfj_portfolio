<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded corner square container representing the patch -->
  <rect width="64" height="64" rx="16" fill="#2b1d16" />
  
  <!-- Subtle border representing the coaster edge -->
  <rect x="2" y="2" width="60" height="60" rx="14" stroke="#3d2c22" strokeWidth="1.5" />
  
  <!-- Embroidered styled text <phfj/> -->
  <text 
    x="32" 
    y="37.5" 
    text-anchor="middle" 
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" 
    font-weight="bold" 
    font-size="11" 
    letter-spacing="-0.5" 
    fill="#ebd0b9"
  >&lt;phfj/&gt;</text>
</svg>
